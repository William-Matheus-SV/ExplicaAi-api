<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExplicaAí - Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Inter", sans-serif;
        padding: 40px 20px;
      }
      .profile-container {
        background: white;
        border-radius: 32px;
        max-width: 700px;
        margin: 0 auto;
        padding: 40px;
      }
      .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: 600;
        margin: 0 auto 20px;
      }
      .schedule-item {
        background: #f8fafc;
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        border: 1px solid #e2e8f0;
      }
      .btn-acao {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
        width: 100%;
        margin-top: 20px;
      }
      .btn-voltar {
        background: transparent;
        border: 2px solid #e2e8f0;
        padding: 10px 20px;
        border-radius: 30px;
        margin-bottom: 20px;
        text-decoration: none;
        display: inline-block;
        color: #475569;
      }
      .btn-voltar:hover {
        background: #f8fafc;
      }
      .badge-subject {
        background: #667eea20;
        color: #667eea;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        margin: 3px;
        display: inline-block;
      }
      .schedule-time {
        color: #4353ff;
        font-weight: 600;
        background: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
      }
      .btn-selecionar {
        background: #10b981;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div style="max-width: 700px; margin: 0 auto">
      <a href="busca.html" class="btn-voltar"
        ><i class="bi bi-arrow-left"></i> Voltar para Busca</a
      >
      <div class="profile-container" id="perfil">
        <div class="text-center py-4">Carregando...</div>
      </div>
    </div>

    <script src="../Javascript/storage.js"></script>
    <script>
            const urlParams = new URLSearchParams(window.location.search);
            const matricula = urlParams.get("matricula");
            const usuario = getUsuarioByMatricula(matricula);
            const usuarioLogado = getUsuarioLogado();

            if (!usuario) window.location.href = "busca.html";

            function getIniciais(nome) {
              return nome
                .split(" ")
                .map((n) => n[0])
                .join("")
                .toUpperCase()
                .substring(0, 2);
            }

            // Horários do tutor (se for tutor)
            let horariosDisponiveis = [];
            if (usuario.papel === "tutor") {
              horariosDisponiveis = [
                { dia: "Segunda-feira", horario: "14:00 - 16:00", disponivel: true },
                { dia: "Terça-feira", horario: "10:00 - 12:00", disponivel: true },
                { dia: "Quarta-feira", horario: "14:00 - 16:00", disponivel: true },
                { dia: "Quinta-feira", horario: "16:00 - 18:00", disponivel: true },
              ];
              const salvos = localStorage.getItem(`horarios_${usuario.matricula}`);
              if (salvos) horariosDisponiveis = JSON.parse(salvos);
            }

            function renderizar() {
            const isAlunoLogado = usuarioLogado && usuarioLogado.papel === "aluno";
            const isTutorLogado = usuarioLogado && usuarioLogado.papel === "tutor";
            const podeFazerMatch =
              (isAlunoLogado && usuario.papel === "tutor") ||
              (isTutorLogado && usuario.papel === "aluno");

            let html = `
                      <div class="profile-img">${getIniciais(usuario.nome)}</div>
                      <h2 class="text-center">${usuario.nome}</h2>
                      <p class="text-center text-muted">
                          <i class="bi bi-person-badge"></i> Matrícula: ${usuario.matricula} • ${usuario.idade} anos •
                          ${usuario.papel === "tutor" ? "🎓 Tutor" : "📚 Aluno"}
                      </p>
                      <p class="text-center">
                          <strong>${usuario.papel === "tutor" ? "Matérias que ensina:" : "Precisa de ajuda em:"}</strong><br>
                          ${usuario.materias.map((m) => `<span class="badge-subject">${m}</span>`).join("")}
                      </p>
                      <p><i class="bi bi-chat-text"></i> <strong>Bio:</strong><br>${usuario.bio || "Sem descrição"}</p>
                  `;

            // Se for TUTOR e quem está vendo é ALUNO -> mostrar horários
            if (usuario.papel === "tutor" && isAlunoLogado) {

               // ============================================
        // NOVO: SELETOR DE MATÉRIA
        // ============================================
        const materiasEmComum = usuarioLogado.materias.filter(m => usuario.materias.includes(m));

        if (materiasEmComum.length > 0) {
          htmlContent += `
            <div class="mb-3 mt-3">
              <label class="form-label fw-bold">Selecione a matéria para a tutoria:</label>
              <select id="selectMateria" class="form-select" style="border-radius: 12px; padding: 10px; border: 2px solid #e2e8f0;">
                ${materiasEmComum.map(m => `<option value="${m}">${m}</option>`).join('')}
              </select>
            </div>
          `;
        }
        // ============================================
        const horariosDisponiveisFiltrados = horariosDisponiveis.filter(
          (h) => h.disponivel,
        );
        htmlContent += `<h4 class="mt-4"><i class="bi bi-calendar-week"></i> Horários Disponíveis</h4>`;
      }

              const horariosDisponiveisFiltrados = horariosDisponiveis.filter(
                (h) => h.disponivel,
              );
              html += `<h4 class="mt-4"><i class="bi bi-calendar-week"></i> Horários Disponíveis</h4>`;

              if (horariosDisponiveisFiltrados.length === 0) {
                html += `<div class="text-muted text-center py-3">📅 Nenhum horário disponível no momento</div>`;
              } else {
                html += `<div id="horariosList">`;
                horariosDisponiveisFiltrados.forEach((h) => {
                  htmlContent += `
                                  <div class="schedule-item">
                                      <span><i class="bi bi-calendar"></i> ${h.dia}</span>
                                      <span class="schedule-time">${h.horario}</span>
                                      <button class="btn-selecionar" data-dia="${h.dia}" data-horario="${h.horario}">Selecionar</button>
                                  </div>
                              `;
                });
                htmlContent += `</div>`;
                htmlContent += `<button id="btnConfirmarMatch" class="btn-acao"
                style="display:none"><i class="bi bi-check-circle"></i> Confirmar Match</button>`;
              }
            }
           }
            // Botão de ação (se pode fazer match)
            if (podeFazerMatch && !(usuario.papel === "tutor" && isAlunoLogado)) {
              const textoBotao = isAlunoLogado
                ? "Solicitar Tutoria"
                : "Oferecer Tutoria";
              html += `<button id="btnMatchDireto" class="btn-acao"><i class="bi bi-chat-dots"></i> ${textoBotao}</button>`;
            }

            document.getElementById("perfil").innerHTML = html;

            // Configurar seleção de horário (se for tutor sendo visto por aluno)
            if (
              usuario.papel === "tutor" &&
              isAlunoLogado &&
              horariosDisponiveis.filter((h) => h.disponivel).length > 0
            ) {
              let horarioSelecionado = null;
              document.querySelectorAll(".btn-selecionar").forEach((btn) => {
                btn.onclick = () => {
                  document
                    .querySelectorAll(".btn-selecionar")
                    .forEach((b) => (b.style.display = "inline-block"));
                  btn.style.display = "none";
                  horarioSelecionado = {
                    dia: btn.dataset.dia,
                    horario: btn.dataset.horario,
                  };
                  const btnConfirmar = document.getElementById("btnConfirmarMatch");
                  btnConfirmar.style.display = "block";
                  btnConfirmar.onclick = () =>
                    confirmarMatchComHorario(
                      horarioSelecionado.dia,
                      horarioSelecionado.horario,
                    );
                };
              });
            }

            // Match direto (sem horário - aluno vendo aluno? não deveria acontecer)
            const btnMatchDireto = document.getElementById("btnMatchDireto");
            if (btnMatchDireto) {
              btnMatchDireto.onclick = () => confirmarMatchDireto();
            }

            function confirmarMatchComHorario(dia, horario) {
              const index = horariosDisponiveis.findIndex(
                (h) => h.dia === dia && h.horario === horario,
              );
              if (index !== -1) {
                horariosDisponiveis[index].disponivel = false;
                localStorage.setItem(
                  `horarios_${usuario.matricula}`,
                  JSON.stringify(horariosDisponiveis),
                );
              }

        // ============================================
        // PEGAR A MATÉRIA SELECIONADA
        // ============================================
        const selectMateria = document.getElementById('selectMateria');
        const materiaSelecionada = selectMateria ? selectMateria.value : (usuario.materias[0] || "Matéria geral");
        // ============================================

              const match = {
                alunoMatricula:
                  usuarioLogado.papel === "aluno"
                    ? usuarioLogado.matricula
                    : usuario.matricula,
                tutorMatricula:
                  usuarioLogado.papel === "tutor"
                    ? usuarioLogado.matricula
                    : usuario.matricula,

                alunoNome: usuarioLogado.nome,
                tutorNome: usuario.nome,
                dia: dia,
                horario: horario,
                materia: materiaSelecionada,
                status: "confirmado",
                dataMatch: new Date().toISOString(),
              };

              const matchSalvo = salvarMatch(match);
              window.location.href = `tutoria_marcada.html?matchId=${matchSalvo.id}
              &aluno=${match.alunoMatricula}&tutor=${match.tutorMatricula}
              &dia=${encodeURIComponent(dia)}&horario=${encodeURIComponent(horario)}
              &materia=${encodeURIComponent(materiaSelecionada)}`;
            }

            function confirmarMatchDireto() {
              const match = {
                alunoMatricula:
                  usuarioLogado.papel === "aluno"
                    ? usuarioLogado.matricula
                    : usuario.matricula,
                tutorMatricula:
                  usuarioLogado.papel === "tutor"
                    ? usuarioLogado.matricula
                    : usuario.matricula,
                status: "confirmado",
                dataMatch: new Date().toISOString(),
              };
              salvarMatch(match);
              window.location.href = `tutoria_marcada.html?aluno=${match.alunoMatricula}&tutor=${match.tutorMatricula}`;
            }
            // Mostrar média de avaliações
            if (usuario.papel === "tutor") {
              const media = getMediaTutor(usuario.matricula);
              const total = getAvaliacoesByTutor(usuario.matricula).length;

              html += `
              <div class="avaliacao-info mt-3">
                  <i class="bi bi-star-fill" style="color: #fbbf24;"></i>
                  <strong>${media}</strong> / 5
                  <span class="text-muted">(${total} ${total === 1 ? "avaliação" : "avaliações"})</span>
              </div>
              `;
            }
            renderizar();
    </script>
  </body>
</html>
