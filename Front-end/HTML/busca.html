<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExplicaAí - Busca</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/busca.css" />
  </head>
  <body>
    <div class="busca-container">
      <button
        class="btn-voltar"
        onclick="window.location.href='dashboard.html'"
      >
        <i class="bi bi-arrow-left"></i> Voltar
      </button>

      <div class="card-busca">
        <div class="card-header-custom">
          <i class="bi bi-person-chalkboard"></i> Buscar Tutor por Matéria
        </div>
        <select id="selectTutor" class="form-select mb-3">
          <option value="">Selecione uma matéria...</option>
          <option value="Matemática">Matemática</option>
          <option value="Física">Física</option>
          <option value="Química">Química</option>
          <option value="Português">Português</option>
          <option value="História">História</option>
          <option value="Biologia">Biologia</option>
          <option value="Inglês">Inglês</option>
        </select>
        <div id="resultadoTutores"></div>
      </div>

      <div class="card-busca">
        <div class="card-header-custom">
          <i class="bi bi-people"></i> Buscar Aluno por Matéria
        </div>
        <select id="selectAluno" class="form-select mb-3">
          <option value="">Selecione uma matéria...</option>
          <option value="Matemática">Matemática</option>
          <option value="Física">Física</option>
          <option value="Química">Química</option>
          <option value="Português">Português</option>
          <option value="História">História</option>
          <option value="Biologia">Biologia</option>
          <option value="Inglês">Inglês</option>
        </select>
        <div id="resultadoAlunos"></div>
      </div>
    </div>

    <script src="../Javascript/storage.js"></script>
    <script>
      const usuarioLogado = getUsuarioLogado();
      if (!usuarioLogado) window.location.href = "login.html";

      // Função para gerar estrelas baseado na nota
      function gerarEstrelas(nota) {
        const notaNum = parseFloat(nota);
        const estrelasCheias = Math.floor(notaNum);
        const temMeiaEstrela = notaNum - estrelasCheias >= 0.5;
        const estrelasVazias = 5 - Math.ceil(notaNum);

        let html = "";

        for (let i = 0; i < estrelasCheias; i++) {
          html += '<i class="bi bi-star-fill estrela-cheia"></i>';
        }

        if (temMeiaEstrela) {
          html += '<i class="bi bi-star-half estrela-meia"></i>';
        }

        for (let i = 0; i < estrelasVazias; i++) {
          html += '<i class="bi bi-star estrela-vazia"></i>';
        }

        return html;
      }

      // Função para renderizar resultados
      function renderizar(lista, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (lista.length === 0) {
          container.innerHTML =
            '<div class="text-muted text-center py-3">Nenhum resultado encontrado</div>';
          return;
        }

        let html = "";
        for (let i = 0; i < lista.length; i++) {
          const item = lista[i];
          let mediaHtml = "";

          if (item.papel === "tutor") {
            const avaliacoes = getAvaliacoesByTutor(item.matricula);
            if (avaliacoes.length > 0) {
              const soma = avaliacoes.reduce((acc, a) => acc + a.nota, 0);
              const notaMedia = (soma / avaliacoes.length).toFixed(1);
              mediaHtml = `
                            <div class="rating">
                                ${gerarEstrelas(notaMedia)}
                                <span class="nota-media">${notaMedia}</span>
                                <span class="total-avaliacoes">(${avaliacoes.length})</span>
                            </div>
                        `;
            } else {
              mediaHtml = `
                            <div class="rating">
                                ${gerarEstrelas(0)}
                                <span class="nota-media sem-avaliacao">Sem avaliações</span>
                            </div>
                        `;
            }
          }

          html += `
                    <div class="result-item" onclick="window.location.href='perfil.html?matricula=${item.matricula}'">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${item.nome}</strong><br>
                                <small class="text-muted">${item.papel === "tutor" ? "🎓 Tutor" : "📚 Aluno"} • ${item.idade} anos</small>
                                ${mediaHtml}
                            </div>
                            <i class="bi bi-chevron-right" style="color: #667eea; font-size: 1.2rem;"></i>
                        </div>
                        <div class="mt-2">
                            ${item.materias.map((m) => `<span class="badge bg-light text-dark me-1">${m}</span>`).join("")}
                        </div>
                    </div>
                `;
        }

        container.innerHTML = html;
      }

      function buscarTutores(materia) {
        if (!materia) {
          document.getElementById("resultadoTutores").innerHTML = "";
          return;
        }
        const tutores = getUsuariosByTipo("tutor").filter(
          (t) =>
            t.materias.includes(materia) &&
            t.matricula !== usuarioLogado.matricula,
        );
        renderizar(tutores, "resultadoTutores");
      }

      function buscarAlunos(materia) {
        if (!materia) {
          document.getElementById("resultadoAlunos").innerHTML = "";
          return;
        }
        const alunos = getUsuariosByTipo("aluno").filter(
          (a) =>
            a.materias.includes(materia) &&
            a.matricula !== usuarioLogado.matricula,
        );
        renderizar(alunos, "resultadoAlunos");
      }

      document
        .getElementById("selectTutor")
        .addEventListener("change", (e) => buscarTutores(e.target.value));
      document
        .getElementById("selectAluno")
        .addEventListener("change", (e) => buscarAlunos(e.target.value));
    </script>
  </body>
</html>
