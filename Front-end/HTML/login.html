<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExplicaAí - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../CSS/login.css" />
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <div class="mb-3">
          <i
            class="bi bi-chat-dots-fill"
            style="
              font-size: 48px;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
          ></i>
        </div>
        <h1 class="brand-title">ExplicaAí!</h1>
        <p class="text-muted mt-2">
          Conectando quem quer aprender<br />com quem quer ensinar
        </p>
      </div>

      <div id="alertError" class="alert-error mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="errorMessage"></span>
      </div>

      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label fw-semibold text-muted-small"
            >Matrícula</label
          >
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person-badge text-muted"></i>
            </span>
            <input
              type="text"
              class="form-control custom-input"
              id="matricula"
              placeholder="Ex: 2024001"
              required
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold text-muted-small">Senha</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input
              type="password"
              class="form-control custom-input"
              id="senha"
              placeholder="Digite sua senha"
              required
            />
            <span
              class="input-group-text toggle-password"
              onclick="toggleSenha()"
            >
              <i class="bi bi-eye-slash" id="toggleIcon"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn-login mb-4">
          Entrar <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </form>

      <div class="text-center">
        <p class="text-muted-small mb-0">
          Não tem uma conta?
          <a href="cadastro.html" class="register-link">Cadastre-se agora</a>
        </p>
      </div>

      <hr class="my-4" />

      <div class="text-center">
        <p class="text-muted-small mb-0">
          <i class="bi bi-info-circle"></i> Use sua matrícula e senha
          cadastrados
        </p>
      </div>
    </div>

    <script src="../Javascript/storage.js"></script>
    <script>
      function toggleSenha() {
        const senhaInput = document.getElementById("senha");
        const toggleIcon = document.getElementById("toggleIcon");

        if (senhaInput.type === "password") {
          senhaInput.type = "text";
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        } else {
          senhaInput.type = "password";
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const usuarios = getUsuarios();
        if (usuarios.length === 0) {
          const alertDiv = document.getElementById("alertError");
          document.getElementById("errorMessage").innerHTML =
            '💡 Nenhum usuário cadastrado ainda! Clique em "Cadastre-se" para criar sua conta.';
          alertDiv.style.display = "block";
          alertDiv.style.background = "#e0f2fe";
          alertDiv.style.color = "#0284c7";
          alertDiv.style.borderColor = "#bae6fd";
        }
      });

      document
        .getElementById("formLogin")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const matricula = document.getElementById("matricula").value.trim();
          const senha = document.getElementById("senha").value;

          if (!matricula || !senha) {
            mostrarErro("❌ Preencha matrícula e senha!");
            return;
          }

          const usuario = fazerLogin(matricula, senha);

          if (usuario) {
            // Login com sucesso
            window.location.href = "dashboard.html";
          } else {
            // Senha ou matrícula errados
            mostrarErro("❌ Matrícula ou senha incorretos!");
            // Limpa o campo senha para o usuário digitar novamente
            document.getElementById("senha").value = "";
            document.getElementById("senha").focus();
          }
        });

      function mostrarErro(mensagem) {
        const alertDiv = document.getElementById("alertError");
        document.getElementById("errorMessage").innerHTML = mensagem;
        alertDiv.style.display = "block";
        alertDiv.style.background = "#fee2e2";
        alertDiv.style.color = "#dc2626";
        alertDiv.style.borderColor = "#fecaca";

        // Esconde a mensagem após 3 segundos
        setTimeout(() => {
          alertDiv.style.display = "none";
        }, 3000);
      }
    </script>
  </body>
</html>
