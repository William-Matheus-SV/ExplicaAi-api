<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExplicaAí - Match Realizado!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .success-card {
        background-color: white;
        border-radius: 32px;
        padding: 3rem 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        text-align: center;
        max-width: 500px;
        width: 100%;
        animation: fadeInUp 0.6s ease;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
      }
      .success-icon i {
        font-size: 40px;
        color: white;
      }
      .success-title {
        color: #1e293b;
        font-weight: 800;
        font-size: 2rem;
        margin-bottom: 8px;
      }
      .success-subtitle {
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }
      .profile-connection-section {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }
      .profile-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        min-width: 100px;
      }
      .profile-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 600;
      }
      .profile-name {
        color: #1e293b;
        font-weight: 600;
        font-size: 1rem;
      }
      .profile-role {
        color: #94a3b8;
        font-size: 0.75rem;
      }
      .connection-line-container {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .dotted-line {
        width: 30px;
        border-top: 2px dotted #667eea;
      }
      .center-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #667eea;
      }
      .info-badge {
        margin-bottom: 24px;
      }
      .subject-badge {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 600;
        display: inline-block;
      }
      .time-badge {
        color: #475569;
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-agenda {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: 600;
        padding: 14px 28px;
        border-radius: 50px;
        width: 100%;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .btn-agenda:hover {
        transform: translateY(-2px);
        color: white;
      }
      .btn-voltar {
        background: transparent;
        color: #667eea;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 50px;
        border: 2px solid #e2e8f0;
        width: 100%;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-voltar:hover {
        border-color: #667eea;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="success-card">
      <div class="success-icon"><i class="bi bi-check-lg"></i></div>
      <h1 class="success-title">Match Realizado! 🎉</h1>
      <p class="success-subtitle">
        Conexão entre aluno e tutor gerando horas complementares
      </p>

      <div class="profile-connection-section" id="connectionSection"></div>

      <div class="info-badge">
        <span class="subject-badge" id="materiaDisplay"
          ><i class="bi bi-book"></i> Carregando...</span
        >
      </div>

      <div class="time-badge" id="timeDisplay">
        <i class="bi bi-calendar-clock"></i>
        <span>Match realizado agora</span>
      </div>

      <a href="dashboard.html" class="btn-agenda"
        ><i class="bi bi-calendar-check"></i> Ver Minha Agenda</a
      >
      <a href="busca.html" class="btn-voltar"
        ><i class="bi bi-arrow-left"></i> Voltar para Busca</a
      >
    </div>

    <script src="../Javascript/storage.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const alunoMatricula = urlParams.get("aluno");
      const tutorMatricula = urlParams.get("tutor");
      const dia = urlParams.get("dia");
      const horario = urlParams.get("horario");
      const materia = urlParams.get("materia"); // 🔥 PEGAR A MATÉRIA DA URL

      let aluno = getUsuarioByMatricula(alunoMatricula) || {
        nome: "Aluno",
        matricula: alunoMatricula,
      };
      let tutor = getUsuarioByMatricula(tutorMatricula) || {
        nome: "Tutor",
        matricula: tutorMatricula,
      };

      function getIniciais(nome) {
        return nome
          .split(" ")
          .map((n) => n[0])
          .join("")
          .toUpperCase()
          .substring(0, 2);
      }

      document.getElementById("connectionSection").innerHTML = `
    <div class="profile-container">
        <div class="profile-icon">${getIniciais(aluno.nome)}</div>
        <p class="profile-name">${aluno.nome}</p>
        <p class="profile-role">Aluno</p>
    </div>
    <div class="connection-line-container">
        <div class="dotted-line"></div>
        <div class="center-dot"><i class="bi bi-heart-fill" style="font-size: 10px; color: white;"></i></div>
        <div class="dotted-line"></div>
    </div>
    <div class="profile-container">
        <div class="profile-icon">${getIniciais(tutor.nome)}</div>
        <p class="profile-name">${tutor.nome}</p>
        <p class="profile-role">Tutor</p>
    </div>
  `;

      if (dia && horario) {
        document.getElementById("timeDisplay").innerHTML = `
      <i class="bi bi-calendar-check"></i>
      <span>${dia} • ${horario}</span>
    `;
      }

      // 🔥 CORREÇÃO: Mostrar a matéria que veio da URL
      if (materia) {
        document.getElementById("materiaDisplay").innerHTML = `
      <i class="bi bi-book"></i> Matéria: ${materia}
    `;
      } else if (aluno.materias && aluno.materias.length > 0) {
        // Fallback caso não venha na URL
        document.getElementById("materiaDisplay").innerHTML = `
      <i class="bi bi-book"></i> Matéria: ${aluno.materias[0]}
    `;
      }
    </script>
  </body>
</html>
